# fly.toml — personal-rag-service
# Deploy: cd rag-service && ./build.sh && fly deploy
app = "danijeun-rag"
primary_region = "ewr"

[build]

[env]
  RAG_PERSIST_DIR = "/app/embeddings"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
